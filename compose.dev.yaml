services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - '5173:80'

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - API_SECRET=${API_SECRET}
      - DATABASE_PATH=/app/data/life-map.db
    volumes:
      - sqlite-data:/app/data

  bot:
    build:
      context: .
      dockerfile: docker/bot/Dockerfile
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - API_URL=http://api:3000
      - API_SECRET=${API_SECRET}
      - WEB_APP_URL=${WEB_APP_URL}

volumes:
  sqlite-data:
